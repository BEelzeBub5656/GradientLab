<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Void Jack · 虚空21点</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap');

:root {
  --felt: #0d2b1a;
  --felt-dark: #091c10;
  --neon-pink: #ff2d78;
  --neon-cyan: #00f0ff;
  --neon-yellow: #ffe600;
  --neon-green: #39ff14;
  --neon-purple: #b347ea;
  --neon-red: #ff0044;
  --text: #e0d8f0;
  --dim: #6b5e8a;
  --gold: #d4a843;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--felt-dark);
  color: var(--text);
  font-family: 'VT323', 'Courier New', monospace;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16'><circle cx='8' cy='8' r='6' fill='none' stroke='%23ff2d78' stroke-width='2'/></svg>") 8 8, auto;
}

/* ─── Overlays ─── */
/* CRT Scanlines */
body::before {
  content:''; position:fixed; inset:0; z-index:200; pointer-events:none;
  background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.06) 3px, rgba(0,0,0,0.06) 6px);
}
/* Noise overlay */
body::after {
  content:''; position:fixed; inset:0; z-index:199; pointer-events:none; opacity:0.03;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}
/* Vignette */
.vignette {
  position:fixed; inset:0; z-index:198; pointer-events:none;
  background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.7) 100%);
}

/* ─── Table ─── */
.table {
  position:relative; z-index:1;
  width: 95vw; max-width: 1000px; height: 92vh;
  background:
    radial-gradient(ellipse at 50% 40%, #0f3d24 0%, #0a2416 60%, #06140c 100%);
  border: 4px solid rgba(212,168,67,0.3);
  border-radius: 24px;
  box-shadow:
    0 0 0 2px rgba(0,0,0,0.8),
    0 0 60px rgba(0,240,255,0.06),
    inset 0 0 120px rgba(0,0,0,0.5);
  display: flex;
  flex-direction: column;
  padding: 20px 28px 16px;
  overflow: hidden;
}
/* Felt diamond pattern */
.table::before {
  content:''; position:absolute; inset:4px; border-radius:20px; z-index:0; pointer-events:none;
  background-image:
    linear-gradient(45deg, rgba(255,255,255,0.015) 25%, transparent 25%),
    linear-gradient(-45deg, rgba(255,255,255,0.015) 25%, transparent 25%),
    linear-gradient(45deg, transparent 75%, rgba(255,255,255,0.015) 75%),
    linear-gradient(-45deg, transparent 75%, rgba(255,255,255,0.015) 75%);
  background-size: 40px 40px;
  background-position: 0 0, 0 20px, 20px -20px, -20px 0;
}
/* Neon trim */
.table::after {
  content:''; position:absolute; inset:-6px; border-radius:28px; z-index:-1; pointer-events:none;
  background: linear-gradient(180deg, rgba(255,45,120,0.15), rgba(0,240,255,0.15));
  filter: blur(12px);
}

.table-inner { position:relative; z-index:1; display:flex; flex-direction:column; height:100%; gap:0; }

/* ─── Top Bar ─── */
.topbar {
  display:flex; align-items:center; justify-content:space-between;
  padding: 4px 8px 12px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  margin-bottom: 4px;
}
.logo {
  font-family:'Press Start 2P',monospace; font-size:16px;
  background: linear-gradient(180deg, var(--neon-pink) 0%, var(--neon-purple) 50%, var(--neon-cyan) 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  filter: drop-shadow(0 0 6px rgba(255,45,120,0.4));
  letter-spacing: 2px;
}
.chip-area { display:flex; align-items:center; gap:10px; }
.chip-icon {
  width:28px; height:28px; border-radius:50%;
  background: radial-gradient(circle at 35% 35%, var(--neon-yellow), #b8960f);
  border:2px solid #ffe600; box-shadow: 0 0 12px rgba(255,230,0,0.4);
  position:relative;
}
.chip-icon::after {
  content:'$'; position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
  font-family:'Press Start 2P',monospace; font-size:8px; color:#5a4a00;
}
.chip-count {
  font-family:'Press Start 2P',monospace; font-size:16px; color:var(--neon-yellow);
  text-shadow:0 0 12px rgba(255,230,0,0.5);
}

/* ─── Hands Area ─── */
.hands { flex:1; display:flex; flex-direction:column; justify-content:center; gap:12px; min-height:0; }

.zone {
  position:relative; padding: 8px 0;
  border-left: 2px solid rgba(255,255,255,0.04);
  padding-left: 14px;
  min-height: 120px;
}
.zone.dealer { border-left-color: rgba(255,45,120,0.2); }
.zone.player { border-left-color: rgba(0,240,255,0.2); }
.zone-header {
  display:flex; align-items:baseline; gap:16px;
  font-family:'Press Start 2P',monospace; font-size:9px;
  margin-bottom: 8px;
}
.zone-label { color:var(--dim); letter-spacing:2px; }
.zone-label.dl { color:var(--neon-pink); }
.zone-label.pl { color:var(--neon-cyan); }
.zone-score-badge {
  font-size:10px; padding:3px 8px; border-radius:5px;
  background:rgba(0,0,0,0.5); border:1px solid rgba(255,255,255,0.1);
  color:var(--dim);
}
.zone-score-badge.active { color:var(--neon-cyan); border-color:rgba(0,240,255,0.3); }
.zone-score-badge.bust { color:var(--neon-red); border-color:rgba(255,0,68,0.4); }

.cards-row { display:flex; gap:14px; align-items:flex-start; flex-wrap:wrap; }

/* ─── Cards ─── */
.card {
  width:100px; height:140px; border-radius:9px;
  background: #1a1028;
  border: 2px solid rgba(255,255,255,0.12);
  position:relative; font-family:'Press Start 2P',monospace;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  transition: transform 0.25s ease, box-shadow 0.25s ease;
  flex-shrink:0; overflow:hidden;
  image-rendering: pixelated;
}
.card:hover { transform: translateY(-6px); z-index:5; }
.card-back {
  background: linear-gradient(135deg, #1a0a2e 0%, #2d1b4e 50%, #1a0a2e 100%);
  border-color: var(--neon-pink);
  box-shadow: 0 0 16px rgba(255,45,120,0.2);
}
.card-back-inner {
  position:absolute; inset:4px; border-radius:4px;
  border: 2px dashed rgba(255,255,255,0.15);
  display:flex; align-items:center; justify-content:center;
}
.card-back-inner::after {
  content:'×'; font-size:36px; color:rgba(255,45,120,0.5); text-shadow:0 0 12px rgba(255,45,120,0.3);
}
.card-rank { font-size:34px; line-height:1; }
.card-suit { font-size:26px; margin-top:3px; }
.card-suit-red { color:var(--neon-red); text-shadow:0 0 8px rgba(255,0,68,0.5); }
.card-suit-black { color:#fff; text-shadow:0 0 8px rgba(255,255,255,0.3); }
.card-corner {
  position:absolute; top:8px; left:10px; font-size:12px;
  display:flex; flex-direction:column; align-items:center; line-height:1.1;
}
.card-center-suit { font-size:44px; opacity:0.08; position:absolute; pointer-events:none; }

/* Card glitch effects */
.card.glitch { animation: cardGlitch 0.25s ease; }
@keyframes cardGlitch {
  0%,100% { transform:translate(0); }
  15% { transform:translate(-4px,2px); filter:brightness(1.3) hue-rotate(5deg); }
  35% { transform:translate(4px,-3px); filter:brightness(0.8) hue-rotate(-3deg); }
  55% { transform:translate(-2px,-2px); }
  75% { transform:translate(3px,4px); filter:brightness(1.1); }
}
.card.new-card { animation: dealIn 0.35s cubic-bezier(0.16,1,0.3,1); }
@keyframes dealIn {
  from { transform: translateY(-50px) scale(0.4); opacity:0; filter:blur(4px); }
  to { transform:translateY(0) scale(1); opacity:1; filter:blur(0); }
}

/* Pixel flicker on borders */
.card::before {
  content:''; position:absolute; inset:-2px; border-radius:10px; z-index:-1;
  opacity:0; transition:opacity 0.3s;
  background: linear-gradient(45deg, var(--neon-pink), transparent 40%, transparent 60%, var(--neon-cyan));
  filter: blur(3px);
}
.card:hover::before { opacity:0.5; }

/* ─── Message ─── */
.msg-row { text-align:center; padding:6px 0; min-height:28px; }
.message {
  font-family:'Press Start 2P',monospace; font-size:11px;
  color:var(--dim); transition:color 0.3s; letter-spacing:1px;
}
.message.win { color:var(--neon-green); text-shadow:0 0 16px rgba(57,255,20,0.6); animation: msgPop 0.4s ease; }
.message.lose { color:var(--neon-pink); text-shadow:0 0 16px rgba(255,45,120,0.5); }
.message.push { color:var(--neon-yellow); }
.message.bust { color:var(--neon-red); animation: textShake 0.35s ease; }
@keyframes msgPop {
  0% { transform:scale(0.8); opacity:0; }
  50% { transform:scale(1.1); }
  100% { transform:scale(1); opacity:1; }
}
@keyframes textShake {
  0%,100% { transform:translateX(0); }
  25% { transform:translateX(-5px); }
  75% { transform:translateX(5px); }
}

/* ─── Bottom Area ─── */
.bottom-area {
  display:flex; flex-direction:column; gap:10px;
  padding-top:10px; border-top:1px solid rgba(255,255,255,0.05);
}
.bet-row { display:flex; align-items:center; gap:14px; justify-content:center; }
.bet-chip {
  width:50px; height:50px; border-radius:50%;
  border:2px solid rgba(255,230,0,0.4);
  background: radial-gradient(circle at 35% 35%, #ffe600, #b8960f);
  color:#5a4a00; font-family:'Press Start 2P',monospace; font-size:9px;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  transition:all 0.15s; box-shadow:0 0 10px rgba(255,230,0,0.2);
}
.bet-chip:hover { transform:scale(1.15); box-shadow:0 0 22px rgba(255,230,0,0.5); }
.bet-chip:active { transform:scale(0.9); }
.bet-chip.selected { border-color:#fff; box-shadow:0 0 24px rgba(255,230,0,0.8); }
.bet-chip:disabled { opacity:0.3; cursor:not-allowed; transform:none!important; }
.bet-display {
  font-family:'Press Start 2P',monospace; font-size:14px; color:var(--neon-yellow);
  min-width:90px; text-align:center;
}

.ctrl-row { display:flex; gap:14px; justify-content:center; flex-wrap:wrap; }
.btn {
  font-family:'Press Start 2P',monospace; font-size:10px;
  padding:13px 22px; border-radius:8px; cursor:pointer;
  text-transform:uppercase; letter-spacing:1px;
  transition:all 0.15s; position:relative; overflow:hidden;
}
.btn:active { transform:scale(0.95); }
.btn-hit {
  background:rgba(57,255,20,0.1); border:2px solid var(--neon-green);
  color:var(--neon-green);
}
.btn-hit:hover { background:rgba(57,255,20,0.2); box-shadow:0 0 28px rgba(57,255,20,0.3); }
.btn-stand {
  background:rgba(255,0,68,0.1); border:2px solid var(--neon-red);
  color:var(--neon-red);
}
.btn-stand:hover { background:rgba(255,0,68,0.2); box-shadow:0 0 28px rgba(255,0,68,0.3); }
.btn-double {
  background:rgba(179,71,234,0.1); border:2px solid var(--neon-purple);
  color:var(--neon-purple);
}
.btn-double:hover { background:rgba(179,71,234,0.2); box-shadow:0 0 28px rgba(179,71,234,0.3); }
.btn-deal {
  font-size:12px; padding:16px 32px;
  background:linear-gradient(135deg, rgba(255,45,120,0.25), rgba(179,71,234,0.25));
  border:2px solid var(--neon-pink); color:#fff;
}
.btn-deal:hover { box-shadow:0 0 36px rgba(255,45,120,0.5); transform:scale(1.03); }
.btn-deal:active { transform:scale(0.97); }
.btn:disabled { opacity:0.25; cursor:not-allowed; box-shadow:none!important; }

/* ─── Shake & Glitch ─── */
.shake { animation: screenShake 0.45s ease; }
@keyframes screenShake {
  0%,100%{transform:translate(0)}
  10%{transform:translate(-7px,5px)}
  20%{transform:translate(7px,-4px)}
  30%{transform:translate(-5px,-6px)}
  40%{transform:translate(6px,3px)}
  50%{transform:translate(-4px,7px)}
  60%{transform:translate(8px,-3px)}
  70%{transform:translate(-6px,-5px)}
  80%{transform:translate(3px,6px)}
  90%{transform:translate(-2px,-3px)}
}
.glitch-flash {
  position:fixed; inset:0; z-index:197; pointer-events:none; opacity:0;
  background: linear-gradient(0deg, rgba(255,45,120,0.1) 0%, transparent 15%, rgba(0,240,255,0.08) 85%, transparent 100%);
  transition:opacity 0.08s;
}
.glitch-flash.on { opacity:1; }

/* ─── Pixel breakup text ─── */
.pixel-split { animation: pixelSplit 0.3s ease; }
@keyframes pixelSplit {
  0%{ text-shadow: -2px 0 var(--neon-pink), 2px 0 var(--neon-cyan); }
  50%{ text-shadow: -4px 0 var(--neon-pink), 4px 0 var(--neon-cyan); }
  100%{ text-shadow: 0 0 var(--neon-pink), 0 0 var(--neon-cyan); }
}

/* ─── Dealer Avatar ─── */
.dealer-avatar {
  font-size:38px;
  filter: drop-shadow(0 0 8px rgba(255,45,120,0.6)) drop-shadow(0 2px 4px rgba(0,0,0,0.8));
  animation: avatarFloat 3s ease-in-out infinite, avatarGlitch 5s ease infinite;
  line-height:1;
}
@keyframes avatarFloat {
  0%,100% { transform:translateY(0); }
  50% { transform:translateY(-4px); }
}
@keyframes avatarGlitch {
  0%,94%,100% { transform:translateY(0) scaleX(1); }
  95% { transform:translateY(-2px) scaleX(0.9); }
  96% { transform:translateY(2px) scaleX(1.1); filter:drop-shadow(0 0 12px var(--neon-pink)); }
  97% { transform:translateY(0) scaleX(1); }
}

/* ─── Card Flip ─── */
.card.flip {
  animation: cardFlip 0.5s ease;
}
@keyframes cardFlip {
  0% { transform:rotateY(0); }
  49% { transform:rotateY(90deg); }
  50% { transform:rotateY(-90deg); }
  100% { transform:rotateY(0); }
}

/* ─── Particle Canvas ─── */
#particleCanvas {
  position:fixed; inset:0; z-index:150; pointer-events:none;
}

/* ─── Responsive ─── */
@media (max-width:600px) {
  .card { width:60px; height:84px; }
  .card-rank { font-size:22px; }
  .card-suit { font-size:18px; }
  .cards-row { gap:8px; }
  .btn { font-size:8px; padding:10px 12px; }
  .btn-deal { font-size:10px; padding:12px 18px; }
  .table { padding:10px 12px 8px; height:96vh; }
  .logo { font-size:11px; }
  .chip-count { font-size:13px; }
  .bet-chip { width:40px; height:40px; font-size:7px; }
  .dealer-avatar { font-size:28px; }
}

</style>
</head>
<body>
<div class="glitch-flash" id="glitchFlash"></div>
<div class="vignette"></div>
<canvas id="particleCanvas"></canvas>

<div class="table" id="table">
  <div class="table-inner">

    <div class="topbar">
      <div class="logo">VOID JACK</div>
      <div class="chip-area">
        <div class="chip-icon"></div>
        <span class="chip-count" id="chipCount">$1000</span>
      </div>
    </div>

    <div class="hands">
      <div class="zone dealer">
        <div class="zone-header">
          <span class="dealer-avatar">😈</span>
          <span class="zone-label dl">♦ DEALER</span>
          <span class="zone-score-badge" id="dealerScore"></span>
        </div>
        <div class="cards-row" id="dealerCards"></div>
      </div>

      <div class="msg-row"><div class="message" id="message">✦ 下注开始游戏 ✦</div></div>

      <div class="zone player">
        <div class="zone-header">
          <span class="zone-label pl">♠ PLAYER</span>
          <span class="zone-score-badge active" id="playerScore"></span>
        </div>
        <div class="cards-row" id="playerCards"></div>
      </div>
    </div>

    <div class="bottom-area">
      <div class="bet-row">
        <button class="bet-chip" data-bet="50">50</button>
        <button class="bet-chip" data-bet="100">100</button>
        <span class="bet-display" id="betDisplay">→ 下注</span>
        <button class="bet-chip" data-bet="200">200</button>
        <button class="bet-chip" data-bet="500">500</button>
      </div>
      <div class="ctrl-row">
        <button class="btn btn-hit" id="btnHit" disabled>HIT</button>
        <button class="btn btn-stand" id="btnStand" disabled>STAND</button>
        <button class="btn btn-double" id="btnDouble" disabled>DOUBLE</button>
        <button class="btn btn-deal" id="btnDeal" disabled>♠ DEAL ♠</button>
      </div>
    </div>

  </div>
</div>

<script>
// ─── State ──────────────────────────────
const suits = ['♠','♥','♦','♣'];
const suitColors = { '♠':'black', '♥':'red', '♦':'red', '♣':'black' };
let deck=[], playerHand=[], dealerHand=[];
let chips=1000, currentBet=0;
let gameActive=false, playerStood=false, selectedBet=0;

const $=id=>document.getElementById(id);
const chipCount=$('chipCount'),dealerCards=$('dealerCards'),playerCards=$('playerCards');
const dealerScore=$('dealerScore'),playerScore=$('playerScore'),message=$('message');
const btnHit=$('btnHit'),btnStand=$('btnStand'),btnDouble=$('btnDouble'),btnDeal=$('btnDeal');
const betDisplay=$('betDisplay'),table=$('table'),glitchFlash=$('glitchFlash');

// ─── Deck ───────────────────────────────
function createDeck(){
  deck=[]; for(let s of suits) for(let r=1;r<=13;r++) deck.push({rank:r,suit:s});
  for(let i=deck.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[deck[i],deck[j]]=[deck[j],deck[i]];}
}
function drawCard(){ if(deck.length<10)createDeck(); return deck.pop(); }
function handValue(h){
  let t=0,a=0;
  for(let c of h){ if(c.rank===1){a++;t+=11}else if(c.rank>10)t+=10;else t+=c.rank; }
  while(t>21&&a>0){t-=10;a--;}
  return t;
}
function isBlackjack(h){return h.length===2&&handValue(h)===21;}
function isBust(h){return handValue(h)>21;}
function rankName(r){if(r===1)return'A';if(r===11)return'J';if(r===12)return'Q';if(r===13)return'K';return r.toString();}

// ─── Render ──────────────────────────────
function renderCard(card){
  const d=document.createElement('div'); d.className='card';
  const color=suitColors[card.suit];
  d.innerHTML=`
    <div class="card-corner"><span class="card-rank" style="color:${color==='red'?'var(--neon-red)':'#fff'}">${rankName(card.rank)}</span><span class="card-suit card-suit-${color}" style="font-size:10px">${card.suit}</span></div>
    <span class="card-center-suit card-suit-${color}">${card.suit}</span>
  `;
  return d;
}
function renderCardBack(){
  const d=document.createElement('div'); d.className='card card-back';
  d.innerHTML='<div class="card-back-inner"></div>';
  return d;
}
function renderAll(){
  dealerCards.innerHTML='';
  for(let i=0;i<dealerHand.length;i++){
    if(i===0&&gameActive&&!playerStood) dealerCards.appendChild(renderCardBack());
    else dealerCards.appendChild(renderCard(dealerHand[i]));
  }
  const dv=gameActive&&!playerStood?handValue([dealerHand[0]]):handValue(dealerHand);
  dealerScore.textContent=gameActive&&!playerStood?'?':dv;
  dealerScore.className='zone-score-badge'+(gameActive&&!playerStood?'':(dv>21?' bust':' active'));

  playerCards.innerHTML='';
  playerHand.forEach(c=>playerCards.appendChild(renderCard(c)));
  const pv=handValue(playerHand);
  playerScore.textContent=pv>21?'BUST':pv;
  playerScore.className='zone-score-badge'+(pv>21?' bust':' active');
}
function addCardAnim(container,card){
  const el=renderCard(card); el.classList.add('new-card'); container.appendChild(el);
}

// ─── Chip Display ─────────────────────────
function updateChips(){ chipCount.textContent='$'+chips; }
function flashChips(){
  chipCount.style.transform='scale(1.3)'; chipCount.style.color='#fff';
  setTimeout(()=>{chipCount.style.transform='';chipCount.style.color='';},200);
}
function updateBet(){
  betDisplay.textContent=selectedBet>0?`$${selectedBet}`:'→ 下注';
  btnDeal.disabled=selectedBet<=0||selectedBet>chips||gameActive;
  document.querySelectorAll('.bet-chip').forEach(b=>{
    b.classList.toggle('selected',parseInt(b.dataset.bet)===selectedBet);
    b.disabled=gameActive;
  });
}
function showMessage(text,cls){
  message.textContent=text; message.className='message '+(cls||'');
  if(cls==='bust'){ message.classList.add('pixel-split'); setTimeout(()=>message.classList.remove('pixel-split'),400); }
}
function setControls(enabled){
  btnHit.disabled=!enabled; btnStand.disabled=!enabled;
  btnDouble.disabled=!enabled||playerHand.length!==2||chips<currentBet;
  btnDeal.disabled=true;
  document.querySelectorAll('.bet-chip').forEach(b=>b.disabled=true);
}
function flash(){ glitchFlash.classList.add('on'); setTimeout(()=>glitchFlash.classList.remove('on'),120); }
function shake(){ table.classList.add('shake'); setTimeout(()=>table.classList.remove('shake'),500); }

// ─── Game Logic ──────────────────────────
function startRound(){
  if(selectedBet<=0||selectedBet>chips)return;
  currentBet=selectedBet; chips-=currentBet; updateChips(); createDeck();
  playerHand=[drawCard(),drawCard()]; dealerHand=[drawCard(),drawCard()];
  gameActive=true; playerStood=false; selectedBet=0; updateBet(); renderAll(); setControls(true);
  showMessage('HIT or STAND?','');

  if(isBlackjack(playerHand)){
    if(isBlackjack(dealerHand)){ chips+=currentBet; endRound('PUSH — 平局','push'); }
    else { const win=Math.floor(currentBet*2.5); chips+=currentBet+win; endRound('✦ BLACKJACK! ✦','win'); flash(); }
    updateChips();
  }
}
function hit(){
  if(!gameActive)return;
  const card=drawCard(); playerHand.push(card); addCardAnim(playerCards,card); renderAll();
  if(isBust(playerHand)){ endRound('BUST! 爆牌了...','bust'); shake(); flash(); }
  else if(handValue(playerHand)===21) stand();
}
function stand(){
  if(!gameActive)return; playerStood=true; setControls(false); renderAll(); dealerPlay();
}
function double(){
  if(!gameActive||playerHand.length!==2||chips<currentBet)return;
  chips-=currentBet; currentBet*=2; updateChips();
  const card=drawCard(); playerHand.push(card); addCardAnim(playerCards,card); renderAll();
  if(isBust(playerHand)){ endRound('BUST! 爆牌了...','bust'); shake(); flash(); }
  else stand();
}
function dealerPlay(){
  function step(){
    renderAll(); const val=handValue(dealerHand);
    if(val<17){ const card=drawCard(); dealerHand.push(card); addCardAnim(dealerCards,card); setTimeout(step,550); }
    else settleGame();
  }
  setTimeout(step,600);
}
function settleGame(){
  const pv=handValue(playerHand), dv=handValue(dealerHand); renderAll();
  if(isBust(dealerHand)){ chips+=currentBet*2; endRound('庄家爆牌! YOU WIN!','win'); flashChips(); }
  else if(pv>dv){ chips+=currentBet*2; endRound('YOU WIN! 你赢了!','win'); flashChips(); }
  else if(pv===dv){ chips+=currentBet; endRound('PUSH 平局','push'); }
  else { endRound('DEALER WINS 庄家赢','lose'); flash(); }
  updateChips();
}
function endRound(text,cls){ gameActive=false; showMessage(text,cls); setControls(false); renderAll(); updateBet(); }

// ─── Bet ─────────────────────────────────
document.querySelectorAll('.bet-chip').forEach(chip=>{
  chip.addEventListener('click',()=>{
    if(gameActive)return;
    const bet=parseInt(chip.dataset.bet);
    if(bet>chips){ showMessage('筹码不足!','lose'); return; }
    selectedBet=selectedBet===bet?0:bet; updateBet();
    showMessage(selectedBet>0?`下注 $${selectedBet}`:'✦ 下注开始游戏 ✦','');
  });
});
btnDeal.addEventListener('click',startRound);
btnHit.addEventListener('click',hit);
btnStand.addEventListener('click',stand);
btnDouble.addEventListener('click',double);
document.addEventListener('keydown',e=>{
  if(!gameActive)return;
  if(e.key==='h'||e.key==='H')hit();
  if(e.key==='s'||e.key==='S')stand();
  if(e.key==='d'||e.key==='D')double();
});

// ─── Particle System ──────────────────────
const pCanvas = document.getElementById('particleCanvas');
const pCtx = pCanvas.getContext('2d');
let particles = [];

function resizeParticles() {
  pCanvas.width = window.innerWidth;
  pCanvas.height = window.innerHeight;
}
resizeParticles();
window.addEventListener('resize', resizeParticles);

function spawnParticles(x, y, count, colors, type) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 6;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 2,
      life: 1,
      decay: 0.01 + Math.random() * 0.03,
      size: type === 'chip' ? 3 + Math.random() * 5 : 1.5 + Math.random() * 3,
      color: colors[Math.floor(Math.random() * colors.length)],
      type: type || 'spark',
    });
  }
}

function burstWin() {
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight / 2;
  const winColors = ['#39ff14','#ffe600','#00f0ff','#ff2d78','#b347ea','#fff'];
  // Multiple bursts
  for (let b = 0; b < 3; b++) {
    setTimeout(() => {
      spawnParticles(cx + (Math.random()-0.5)*200, cy + (Math.random()-0.5)*100, 40, winColors, 'chip');
    }, b * 150);
  }
  // Ambient sparkles
  spawnParticles(cx, cy, 30, ['#ffe600','#fff'], 'spark');
}

function burstDeal() {
  const rect = playerCards.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  spawnParticles(cx, cy, 8, ['#00f0ff','#fff'], 'spark');
}

function ambientSparkle() {
  if (!gameActive) return;
  const rect = table.getBoundingClientRect();
  const x = rect.left + Math.random() * rect.width;
  const y = rect.top + Math.random() * rect.height;
  spawnParticles(x, y, 1, ['rgba(255,255,255,0.3)'], 'spark');
}

function animateParticles() {
  pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);
  particles = particles.filter(p => p.life > 0);
  for (let p of particles) {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.08; // gravity
    p.life -= p.decay;
    pCtx.globalAlpha = p.life;
    pCtx.fillStyle = p.color;
    if (p.type === 'chip') {
      pCtx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
      // Glow
      pCtx.shadowColor = p.color;
      pCtx.shadowBlur = 8;
      pCtx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
      pCtx.shadowBlur = 0;
    } else {
      pCtx.beginPath();
      pCtx.arc(p.x, p.y, p.size, 0, Math.PI*2);
      pCtx.fill();
    }
  }
  pCtx.globalAlpha = 1;
  requestAnimationFrame(animateParticles);
}
animateParticles();

// Ambient sparkle interval
setInterval(() => {
  if (gameActive && Math.random() < 0.15) ambientSparkle();
}, 800);

// ─── Card Flip on Reveal ──────────────────
const origDealerPlay = dealerPlay;
dealerPlay = function() {
  // When dealer reveals hidden card, sparkle
  setTimeout(() => {
    const rect = dealerCards.getBoundingClientRect();
    spawnParticles(rect.left + rect.width/2, rect.top + rect.height/2, 6, ['#ff2d78','#fff'], 'spark');
  }, 600);
  origDealerPlay();
};

function settleGame(){
  const pv=handValue(playerHand), dv=handValue(dealerHand); renderAll();
  // Animate dealer card reveal
  const cards = dealerCards.querySelectorAll('.card:not(.card-back)');
  if (cards.length > 1) {
    cards[0].classList.add('flip');
    setTimeout(() => cards[0].classList.remove('flip'), 500);
  }
  if(isBust(dealerHand)){ chips+=currentBet*2; endRound('庄家爆牌! YOU WIN!','win'); flashChips(); burstWin(); }
  else if(pv>dv){ chips+=currentBet*2; endRound('YOU WIN! 你赢了!','win'); flashChips(); burstWin(); }
  else if(pv===dv){ chips+=currentBet; endRound('PUSH 平局','push'); }
  else { endRound('DEALER WINS 庄家赢','lose'); flash(); }
  updateChips();
}

// Win particles on blackjack too
const origEndRound = endRound;
endRound = function(text, cls) {
  origEndRound(text, cls);
  if (cls === 'win') burstWin();
};

createDeck(); updateBet(); updateChips(); showMessage('✦ 下注开始游戏 ✦','');
</script>
